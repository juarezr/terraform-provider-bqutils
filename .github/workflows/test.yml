
name: Tests
on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
    paths-ignore:
      - 'README.md'

  push:
    branches: ["main", "release/*"]
    paths-ignore:
      - 'README.md'

  workflow_dispatch:
    inputs:
      branch_commit_or_ref:
        description: "Run this workflow in what branch/commit?"
        required: true
        type: string
        default: main

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@main
        with:
          ref: ${{ inputs.branch_commit_or_ref || '' }}

      - uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'

      - run: go build -v .

      - run: go test ./internal/sqlparse/ -v -count=1

  test:
    name: Acceptance Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@main
        with:
          ref: ${{ inputs.branch_commit_or_ref || '' }}

      - uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - run: TF_ACC=1 go test ./internal/provider/ -v -count=1 -timeout 20m
